name: Feature request
description: Suggest an improvement or new metric
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: What problem does it solve for you?
  - type: dropdown
    id: scope
    attributes:
      label: Keep in mind
      description: The app stays dependency-free, telemetry-free, and free. Does your idea fit?
      options:
        - "Yes, fits those principles"
        - "Not sure"
    validations:
      required: true
